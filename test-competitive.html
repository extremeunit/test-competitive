<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Oxanium',sans-serif;
background:#0a0a0a;
color:white;
overflow-x:hidden;
}

header{
position:fixed;
top:0;
left:0;
width:100%;
padding:18px 30px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,.8);
backdrop-filter:blur(10px);
z-index:1000;
}

.logo{
font-size:20px;
font-weight:500;
color:#ff0000;
letter-spacing:2px;
}

nav a{
color:white;
text-decoration:none;
margin-left:25px;
font-size:10px;
transition:.3s;
}

nav a:hover{
color:#ff0000;
}

.hero{
height:40vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
background:linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.8)),
url('https://www.videogamer.com/wp-content/uploads/Unlock-Vyron-Delta-Force-Hawk-Ops.jpg') center/cover;
}

.hero h1{
font-size:20px;
margin-bottom:15px;
color:#fff;
}

.hero span{
color:#ff0000;
}

.hero p{
font-size:10px;
color:#ccc;
margin-bottom:30px;
}

.btn{
display:inline-block;
padding:14px 28px;
background:#ff0000;
color:white;
text-decoration:none;
border-radius:6px;
font-weight:500;
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
background:#d40000;
}

section{
padding:100px 40px;
}

.title{
font-size:20px;
margin-bottom:40px;
text-align:center;
color:#ff0000;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.card{
background:#111;
padding:25px;
border:1px solid #222;
border-radius:10px;
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
border-color:#ff0000;
}

.card h3{
margin-bottom:12px;
color:white;
}

.card p{
color:#aaa;
font-size:14px;
line-height:1.6;
}

.footer{
text-align:center;
padding:40px;
background:#050505;
color:#777;
}

@media(max-width:768px){
.hero h1{
font-size:30px;
}

nav{
display:none;
}
}
</style>
</head>
